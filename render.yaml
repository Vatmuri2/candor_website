# =============================================================================
# Render Blueprint for the Candor interview web app.
# Deploy: push this repo to GitHub, then in Render click
#   New + -> Blueprint -> pick the candor_website repo.
# Render reads this file and provisions the service + disk automatically.
# =============================================================================
services:
  - type: web
    name: candor-website
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free               # free instance, no payment info required
    healthCheckPath: /health
    autoDeploy: true

    # NOTE: The free plan has NO persistent disk. Live working files (FAISS
    # memory bank, session logs) go to the container's ephemeral filesystem at
    # /var/data and are wiped on redeploy / sleep. To keep durable copies of
    # finished interviews, configure the Google Drive export (see DEPLOY.md §3).
    # To get a persistent disk later, upgrade to plan: starter and add back a
    # `disk:` block mounted at /var/data.

    envVars:
      # ---- Storage locations (logs/data on the disk; configs from the image) ----
      - key: LOGS_DIR
        value: /var/data/logs
      - key: DATA_DIR
        value: /var/data/data
      - key: INTERVIEW_PLAN_PATH
        value: /app/data/configs/topics.json
      - key: USER_PORTRAIT_PATH
        value: /app/data/configs/user_portrait.json

      # ---- Model / interview config ----
      - key: MODEL_NAME
        value: gpt-4.1-mini
      - key: AGENDA_MANAGER_MODEL_NAME
        value: gpt-4.1-mini
      - key: EXPLORATION_PLANNER_MODEL_NAME
        value: gpt-4.1-mini
      - key: EMBEDDING_BACKEND
        value: openai
      - key: MAX_EVENTS_LEN
        value: "20"
      - key: MAX_CONSIDERATION_ITERATIONS
        value: "10"
      - key: USE_BASELINE_PROMPT
        value: "false"
      - key: EVAL_MODE
        value: "false"
      - key: COMPLETION_METRIC
        value: minimum_threshold
      - key: TTS_PROVIDER
        value: openai
      - key: TTS_VOICE
        value: alloy

      # ---- Exploration planner ----
      - key: EXPLORATION_PLANNER_TURN_TRIGGER
        value: "3"
      - key: EXPLORATION_PLANNER_NUM_ROLLOUTS
        value: "3"
      - key: EXPLORATION_PLANNER_ROLLOUT_HORIZON
        value: "3"
      - key: EXPLORATION_PLANNER_MAX_QUESTIONS
        value: "5"
      - key: EXPLORATION_PLANNER_ALPHA
        value: "1"
      - key: EXPLORATION_PLANNER_BETA
        value: "1"
      - key: EXPLORATION_PLANNER_GAMMA
        value: "0.5"
      - key: EXPLORATION_PLANNER_MIN_NOVELTY
        value: "3"

      # ---- Session ----
      - key: SESSION_TIMEOUT_MINUTES
        value: "30"
      - key: MEMORY_THRESHOLD_FOR_UPDATE
        value: "15"

      # ---- Secrets: set these in the Render dashboard (sync:false) ----
      - key: OPENAI_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      # Optional: Google Drive archival of finished interviews.
      # Paste the full service-account JSON as the value, and the target
      # Drive folder id. Leave unset to keep data on the disk only.
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GDRIVE_FOLDER_ID
        sync: false
